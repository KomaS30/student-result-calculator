<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Result Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f0f4ff;
      --white:    #ffffff;
      --border:   #dde3f5;
      --text:     #1a1d2e;
      --muted:    #7b84a3;

      --math:     #ff6b6b;   /* red-coral */
      --sci:      #06d6a0;   /* emerald   */
      --eng:      #845ef7;   /* violet    */
      --sst:      #ff922b;   /* orange    */
      --comp:     #22b8cf;   /* cyan      */

      --btn-from: #845ef7;
      --btn-to:   #5c7cfa;

      --radius:   18px;
      --font:     'Nunito', sans-serif;
      --mono:     'JetBrains Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 64px;
    }

    /* ── Blobs ── */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: .35;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 420px; height: 420px;
      background: #845ef7;
      top: -120px; left: -100px;
    }
    body::after {
      width: 340px; height: 340px;
      background: #22b8cf;
      bottom: -80px; right: -80px;
    }

    /* ── Header ── */
    .header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 32px;
    }
    .header .pill {
      display: inline-block;
      background: linear-gradient(135deg, var(--btn-from), var(--btn-to));
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 5px 16px;
      border-radius: 99px;
      margin-bottom: 14px;
    }
    .header h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 900;
      color: var(--text);
      letter-spacing: -.04em;
      line-height: 1.1;
    }
    .header h1 em {
      font-style: normal;
      background: linear-gradient(90deg, var(--math), var(--btn-from));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: .95rem;
      font-weight: 600;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 600px;
      padding: 36px 32px;
      box-shadow: 0 8px 40px rgba(100,80,200,.10);
    }

    /* ── Name field ── */
    .field-name {
      margin-bottom: 28px;
    }
    .field-name label {
      display: block;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .field-name input {
      width: 100%;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      outline: none;
      background: var(--bg);
      transition: border-color .2s;
    }
    .field-name input:focus { border-color: var(--btn-from); background: #fff; }
    .field-name input::placeholder { color: var(--muted); font-weight: 400; }

    /* ── Section label ── */
    .section-label {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Subject rows ── */
    .subjects { display: flex; flex-direction: column; gap: 12px; }

    .subj-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 2px solid transparent;
      background: var(--bg);
      transition: border-color .2s, box-shadow .2s;
    }
    .subj-row:focus-within {
      background: #fff;
      box-shadow: 0 4px 20px rgba(0,0,0,.07);
    }
    .subj-row.err { border-color: var(--math) !important; animation: shake .3s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-5px); }
      75%      { transform: translateX(5px); }
    }

    .subj-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .subj-meta { flex: 1; }
    .subj-meta .sname {
      font-size: .85rem;
      font-weight: 800;
      color: var(--text);
    }
    .subj-meta .serr {
      font-size: .75rem;
      color: var(--math);
      margin-top: 2px;
      display: none;
    }
    .subj-row.err .serr { display: block; }

    .subj-input-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .subj-input-wrap input {
      width: 72px;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      font-family: var(--mono);
      font-size: .95rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      outline: none;
      background: #fff;
      transition: border-color .2s;
    }
    .subj-input-wrap input:focus { border-color: var(--btn-from); }
    .subj-input-wrap .denom {
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--muted);
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }
    .btn {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 14px;
      font-family: var(--font);
      font-size: .95rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform .15s, opacity .2s;
    }
    .btn:active { transform: scale(.97); }
    .btn-calc {
      background: linear-gradient(135deg, var(--btn-from), var(--btn-to));
      color: #fff;
      box-shadow: 0 6px 24px rgba(132,94,247,.35);
    }
    .btn-calc:hover { opacity: .92; }
    .btn-reset {
      background: var(--bg);
      color: var(--muted);
      border: 2px solid var(--border);
    }
    .btn-reset:hover { color: var(--text); }

    /* ── Print tip ── */
    .tip {
      text-align: center;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 600;
      margin-top: 18px;
    }

    @media (max-width: 480px) {
      .card { padding: 24px 16px; }
      .subj-input-wrap input { width: 60px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="pill">🎓 Academic Tool</div>
  <h1>Student <em>Result</em><br>Calculator</h1>
  <p>Enter marks for 5 subjects and view your result card.</p>
</header>

<div class="card">
  <!-- Name -->
  <div class="field-name">
    <label for="sname">Student Name</label>
    <input type="text" id="sname" placeholder="e.g. Priya Sharma" maxlength="60"/>
  </div>

  <!-- Subjects -->
  <div class="section-label">Subject Marks (out of 100)</div>
  <div class="subjects" id="subjectsArea"></div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn btn-calc" onclick="calculate()">🧮 Calculate Result</button>
    <button class="btn btn-reset" onclick="resetForm()">↺ Reset</button>
  </div>
  <p class="tip">Result opens in a new tab — you can print it directly.</p>
</div>

<script>
  const SUBJECTS = [
    { name:'Mathematics',    icon:'📐', color:'#ff6b6b', bg:'#fff0f0' },
    { name:'Science',        icon:'🔬', color:'#06d6a0', bg:'#f0fff9' },
    { name:'English',        icon:'📖', color:'#845ef7', bg:'#f5f0ff' },
    { name:'Social Studies', icon:'🌍', color:'#ff922b', bg:'#fff5eb' },
    { name:'Computer',       icon:'💻', color:'#22b8cf', bg:'#f0fbff' },
  ];

  const area = document.getElementById('subjectsArea');
  SUBJECTS.forEach((s, i) => {
    area.innerHTML += `
      <div class="subj-row" id="row${i}">
        <div class="subj-icon" style="background:${s.bg};">${s.icon}</div>
        <div class="subj-meta">
          <div class="sname" style="color:${s.color}">${s.name}</div>
          <div class="serr">Enter a mark between 0 and 100.</div>
        </div>
        <div class="subj-input-wrap">
          <input type="number" id="m${i}" min="0" max="100" placeholder="—"
                 oninput="clearErr(${i})" onkeydown="noSign(event)"
                 style="border-color:${s.color}44"/>
          <span class="denom">/100</span>
        </div>
      </div>`;
  });

  function noSign(e) { if(['-','e','+'].includes(e.key)) e.preventDefault(); }
  function clearErr(i) { document.getElementById('row'+i).classList.remove('err'); }

  function getGrade(p) {
    if(p>=90) return {g:'S',label:'Outstanding',color:'#845ef7'};
    if(p>=80) return {g:'A',label:'Excellent',  color:'#06d6a0'};
    if(p>=70) return {g:'B',label:'Very Good',  color:'#22b8cf'};
    if(p>=60) return {g:'C',label:'Good',       color:'#ff922b'};
    if(p>=33) return {g:'D',label:'Pass',        color:'#fcc419'};
    return            {g:'F',label:'Fail',       color:'#ff6b6b'};
  }

  function calculate() {
    let ok = true;
    const marks = [];
    SUBJECTS.forEach((_,i) => {
      const v = document.getElementById('m'+i).value.trim();
      const n = parseFloat(v);
      if(v===''||isNaN(n)||n<0||n>100) {
        document.getElementById('row'+i).classList.add('err');
        ok = false;
      } else { marks.push(n); }
    });
    if(!ok) return;

    const name   = document.getElementById('sname').value.trim() || 'Student';
    const total  = marks.reduce((a,b)=>a+b,0);
    const pct    = (total/500)*100;
    const grade  = getGrade(pct);
    const pass   = marks.every(m=>m>=33) && pct>=33;
    const subjData = SUBJECTS.map((s,i)=>({...s, mark:marks[i], grade:getGrade(marks[i])}));

    // Build result page
    const html = buildResultPage(name, total, pct, grade, pass, subjData);
    const w = window.open('', '_blank');
    w.document.write(html);
    w.document.close();
  }

  function buildResultPage(name, total, pct, grade, pass, subjects) {
    const passColor = pass ? '#06d6a0' : '#ff6b6b';
    const passBg    = pass ? '#f0fff9' : '#fff0f0';
    const passLabel = pass ? '✅ PASS' : '❌ FAIL';
    const today = new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'});

    const rows = subjects.map(s=>`
      <tr>
        <td class="subj-cell"><span class="ico">${s.icon}</span><span style="color:${s.color};font-weight:800">${s.name}</span></td>
        <td class="mark-cell" style="color:${s.color}">${s.mark}</td>
        <td><div class="bar-wrap"><div class="bar" style="width:${s.mark}%;background:${s.color}"></div></div></td>
        <td><span class="g-pill" style="background:${s.grade.color}22;color:${s.grade.color}">${s.grade.g}</span></td>
        <td class="status-cell" style="color:${s.mark>=33?'#06d6a0':'#ff6b6b'}">${s.mark>=33?'Pass':'Fail'}</td>
      </tr>`).join('');

    return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Result Card – ${name}</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:#f0f4ff;min-height:100vh;padding:36px 16px 60px;display:flex;flex-direction:column;align-items:center}
  body::before{content:'';position:fixed;width:500px;height:500px;border-radius:50%;background:#845ef7;filter:blur(110px);opacity:.25;top:-150px;left:-150px;pointer-events:none}
  body::after{content:'';position:fixed;width:400px;height:400px;border-radius:50%;background:#22b8cf;filter:blur(110px);opacity:.25;bottom:-100px;right:-100px;pointer-events:none}

  .page{position:relative;z-index:1;width:100%;max-width:680px}

  /* Top bar */
  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
  .back-btn{display:inline-flex;align-items:center;gap:7px;background:#fff;border:2px solid #dde3f5;border-radius:10px;padding:9px 18px;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:800;color:#7b84a3;cursor:pointer;text-decoration:none;transition:color .2s,border-color .2s}
  .back-btn:hover{color:#1a1d2e;border-color:#845ef7}
  .print-btn{background:linear-gradient(135deg,#845ef7,#5c7cfa);color:#fff;border:none;border-radius:10px;padding:9px 20px;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(132,94,247,.3)}
  .print-btn:hover{opacity:.9}

  /* Hero card */
  .hero{background:#fff;border-radius:22px;border:1.5px solid #dde3f5;padding:36px 32px;box-shadow:0 8px 40px rgba(100,80,200,.10);margin-bottom:20px;text-align:center}
  .hero-badge{display:inline-block;padding:6px 22px;border-radius:99px;font-size:13px;font-weight:800;letter-spacing:.06em;margin-bottom:20px;background:${passBg};color:${passColor};border:2px solid ${passColor}44}
  .hero-name{font-size:clamp(1.5rem,5vw,2.2rem);font-weight:900;color:#1a1d2e;letter-spacing:-.03em;margin-bottom:6px}
  .hero-date{font-size:.8rem;color:#7b84a3;font-weight:600;margin-bottom:28px}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:6px}
  .stat{border-radius:16px;padding:20px 12px;text-align:center}
  .stat .sv{font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:700;margin-bottom:4px}
  .stat .sl{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#7b84a3}
  .stat-total{background:#f5f0ff} .stat-total .sv{color:#845ef7}
  .stat-pct  {background:#f0fbff} .stat-pct   .sv{color:#22b8cf}
  .stat-grade{background:#f0fff9} .stat-grade .sv{color:#06d6a0}

  /* Table card */
  .table-card{background:#fff;border-radius:22px;border:1.5px solid #dde3f5;padding:28px 28px;box-shadow:0 8px 40px rgba(100,80,200,.08)}
  .tc-title{font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#7b84a3;margin-bottom:18px}
  table{width:100%;border-collapse:collapse}
  th{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#7b84a3;text-align:left;padding-bottom:12px;border-bottom:2px solid #f0f4ff}
  td{padding:12px 0;border-bottom:1.5px solid #f0f4ff;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .subj-cell{display:flex;align-items:center;gap:10px;min-width:160px}
  .ico{font-size:18px}
  .mark-cell{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;width:48px}
  .bar-wrap{height:8px;background:#f0f4ff;border-radius:99px;overflow:hidden;width:100%;min-width:80px}
  .bar{height:100%;border-radius:99px;transition:width .6s ease}
  .g-pill{display:inline-block;padding:3px 12px;border-radius:99px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700}
  .status-cell{font-weight:800;font-size:.85rem}

  /* Grade legend */
  .legend{background:#fff;border-radius:18px;border:1.5px solid #dde3f5;padding:20px 24px;margin-top:20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .legend-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#7b84a3;margin-right:6px}
  .lg{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:4px 12px;border-radius:99px}

  .footer{text-align:center;color:#7b84a3;font-size:.75rem;font-weight:600;margin-top:28px}

  @media print{
    body{background:#fff;padding:0}
    body::before,body::after{display:none}
    .top-bar{display:none}
    .hero,.table-card,.legend{border:1px solid #dde;box-shadow:none}
    .page{max-width:100%}
  }
  @media(max-width:500px){
    .stats{grid-template-columns:repeat(3,1fr);gap:8px}
    .stat .sv{font-size:1.2rem}
    .hero{padding:24px 16px}
    .table-card{padding:20px 12px}
    th:nth-child(3),td:nth-child(3){display:none}
  }
</style>
</head>
<body>
<div class="page">
  <div class="top-bar">
    <a class="back-btn" href="javascript:window.close()">← Back to Calculator</a>
    <button class="print-btn" onclick="window.print()">🖨️ Print Result</button>
  </div>

  <div class="hero">
    <div class="hero-badge">${passLabel}</div>
    <div class="hero-name">${name}</div>
    <div class="hero-date">Result generated on ${today}</div>
    <div class="stats">
      <div class="stat stat-total"><div class="sv">${total}<span style="font-size:.9rem">/500</span></div><div class="sl">Total</div></div>
      <div class="stat stat-pct"><div class="sv">${pct.toFixed(1)}%</div><div class="sl">Percentage</div></div>
      <div class="stat stat-grade"><div class="sv">${grade.g}</div><div class="sl">Grade — ${grade.label}</div></div>
    </div>
  </div>

  <div class="table-card">
    <div class="tc-title">Subject-wise Breakdown</div>
    <table>
      <thead>
        <tr>
          <th>Subject</th>
          <th>Marks</th>
          <th>Progress</th>
          <th>Grade</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>

  <div class="legend">
    <span class="legend-title">Grade Scale:</span>
    <span class="lg" style="background:#f5f0ff;color:#845ef7">S — 90–100%</span>
    <span class="lg" style="background:#f0fff9;color:#06d6a0">A — 80–89%</span>
    <span class="lg" style="background:#f0fbff;color:#22b8cf">B — 70–79%</span>
    <span class="lg" style="background:#fff5eb;color:#ff922b">C — 60–69%</span>
    <span class="lg" style="background:#fffde7;color:#fcc419">D — 33–59%</span>
    <span class="lg" style="background:#fff0f0;color:#ff6b6b">F — Below 33%</span>
  </div>

  <div class="footer">Minimum passing marks: 33 per subject &amp; 33% overall</div>
</div>
<script>
  // Animate bars after load
  window.addEventListener('load',()=>{
    document.querySelectorAll('.bar').forEach(b=>{
      const w=b.style.width; b.style.width='0';
      setTimeout(()=>b.style.width=w,100);
    });
  });
<\/script>
</body>
</html>`;
  }

  function resetForm() {
    document.getElementById('sname').value = '';
    SUBJECTS.forEach((_,i)=>{
      document.getElementById('m'+i).value='';
      document.getElementById('row'+i).classList.remove('err');
    });
  }
</script>
</body>
</html>
